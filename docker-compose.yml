version: '3.8'

services:
  mongodb:
    image: mongo:6.0
    container_name: vedaai-mongodb
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db
    restart: always

  redis:
    image: redis:7.0-alpine
    container_name: vedaai-redis
    ports:
      - "6379:6379"
    restart: always

volumes:
  mongo-data:
